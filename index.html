<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jen 手作烘焙｜課程行事曆 2026</title>
<style>
:root {
  --primary:#c17f3e; --primary-light:#f5e6d3; --primary-dark:#8b5a27;
  --accent:#e8a45a; --bg:#fdf8f3; --card:#fff; --text:#3d2c1e;
  --muted:#8a6d5a; --border:#e8d5c0;
  --shadow:0 2px 14px rgba(193,127,62,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-y:scroll}
body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
header{background:linear-gradient(135deg,var(--primary-dark),var(--primary) 55%,var(--accent));color:#fff;padding:22px 36px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(139,90,39,.3)}
header h1{font-size:1.55rem;font-weight:800;letter-spacing:1px}
header p{font-size:.85rem;opacity:.82;margin-top:3px}
.admin-link{background:rgba(255,255,255,.18);color:#fff;text-decoration:none;padding:8px 18px;border-radius:20px;font-size:.85rem;font-weight:600;border:2px solid rgba(255,255,255,.5);transition:all .2s}
.admin-link:hover{background:rgba(255,255,255,.32)}

/* ── Tabs ── */
.tabs{display:flex;background:var(--card);border-bottom:2px solid var(--border);padding:0 36px}
.tab{padding:14px 24px;cursor:pointer;font-size:.95rem;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

main{padding:28px 36px;max-width:1300px;margin:0 auto}
.view{display:none}.view.active{display:block}

/* ── Calendar top ── */
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-top h2{font-size:1.25rem;font-weight:800;color:var(--primary-dark)}
.month-btns{display:flex;gap:8px}
.m-btn{padding:7px 20px;border:2px solid var(--border);background:#fff;border-radius:18px;cursor:pointer;font-size:.88rem;font-weight:700;color:var(--muted);transition:all .2s}
.m-btn:hover,.m-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ── Legend ── */
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;padding:14px 16px;background:#fff;border-radius:12px;border:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted);font-weight:500}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Calendar grid ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px}
.ch{text-align:center;font-size:.82rem;font-weight:700;color:var(--muted);padding:8px 0;letter-spacing:.4px}
.ch.we{color:#e05c5c}

.cd{min-height:130px;background:#fff;border-radius:12px;border:1px solid var(--border);padding:7px;transition:box-shadow .2s;position:relative}
.cd:hover{box-shadow:var(--shadow)}
.cd.empty{background:transparent;border-color:transparent;pointer-events:none}
.cd.today{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
.cd.has-ev{background:var(--primary-light)}
.cd.we{background:#fff9f9}
.cd.we.has-ev{background:#fdf0f0}

/* Day number — clickable to expand */
.dnum{
  font-size:.85rem;font-weight:800;color:var(--muted);margin-bottom:5px;
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;cursor:pointer;transition:all .15s;
}
.dnum:hover{background:var(--primary);color:#fff}
.cd.today .dnum{background:var(--primary);color:#fff}
.cd.we .dnum{color:#e05c5c}
.cd.we.today .dnum{background:#e05c5c;color:#fff}

/* Cart mode */
.cart-toggle{display:flex;align-items:center;gap:5px;background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:22px;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.cart-toggle.active{background:#2e7d52}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#3d1f08,var(--primary-dark) 60%,#8b5a27);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:810;transform:translateY(100%);transition:transform .3s;box-shadow:0 -4px 24px rgba(0,0,0,.3)}
.cart-bar.show{transform:translateY(0)}
.btn-cart-reg{background:#fff;color:var(--primary-dark);border:none;padding:10px 22px;border-radius:22px;font-size:.9rem;font-weight:800;cursor:pointer;white-space:nowrap}
.btn-cart-clear{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.35);padding:8px 14px;border-radius:22px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(30,20,10,.55);z-index:900;align-items:center;justify-content:center}
.cart-overlay.open{display:flex}
.cart-modal{background:#fff;border-radius:18px;width:560px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.28)}
.cart-modal-hd{background:linear-gradient(135deg,#5a3a1a,var(--primary-dark));color:#fff;padding:20px 26px 16px;border-radius:18px 18px 0 0;display:flex;align-items:center;justify-content:space-between}
.cart-modal-body{padding:20px 26px}
.cart-item-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.84rem}
.cart-item-row:last-child{border-bottom:none}
.cfg{margin-bottom:14px}
.cfg label{display:block;font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.cfg input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:9px;font-size:.88rem;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s}
.cfg input:focus{border-color:var(--primary)}.cfg input.err{border-color:var(--red)}
.btn-cart-submit{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:22px;font-size:.95rem;font-weight:800;cursor:pointer;margin-top:4px;transition:background .2s}
.btn-cart-submit:hover{background:var(--primary-dark)}.btn-cart-submit:disabled{opacity:.55;cursor:not-allowed}
.cfg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cfg textarea{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:9px;font-size:.88rem;font-family:inherit;color:var(--text);background:var(--bg);outline:none;resize:vertical;min-height:64px;transition:border-color .2s}
.cfg textarea:focus{border-color:var(--primary)}
.cfg-sec{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.cradio-group{display:flex;flex-direction:column;gap:6px}
.cradio-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;border:2px solid var(--border);border-radius:9px;cursor:pointer;transition:all .2s;font-size:.86rem}
.cradio-opt:hover{border-color:var(--primary);background:var(--primary-light)}
.cradio-opt input[type=radio]{width:16px;height:16px;accent-color:var(--primary);flex-shrink:0}
.cradio-opt.selected{border-color:var(--primary);background:var(--primary-light);font-weight:600}
.ecard.in-cart{outline:2px solid var(--green);outline-offset:2px;position:relative}
.ecard.in-cart::after{content:'✓';position:absolute;top:8px;right:10px;background:#fff;color:#2e7d52;border-radius:50%;width:26px;height:26px;font-size:1rem;font-weight:900;line-height:26px;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,.25)}

/* Event chips — show teacher + title */
.chip{
  font-size:.72rem;padding:4px 6px;border-radius:7px;margin-bottom:3px;
  line-height:1.35;cursor:pointer;transition:opacity .2s;
  overflow:hidden;position:relative;
}
.chip:hover{opacity:.78}
.chip.in-cart{outline:3px solid var(--green);outline-offset:2px;box-shadow:0 0 0 3px rgba(92,158,110,.25)}
.chip.in-cart::after{content:'✓';position:absolute;top:4px;right:4px;background:#fff;color:#2e7d52;border-radius:50%;width:22px;height:22px;font-size:.85rem;font-weight:900;line-height:22px;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,.3)}
.chip-teacher{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-title{opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-time{font-size:.65rem;opacity:.7;margin-bottom:1px}
.chip-fee{font-size:.65rem;font-weight:700;margin-top:2px;opacity:.9}
.chip-img{width:100%;height:70px;object-fit:cover;border-radius:6px;display:block;margin-bottom:4px}

/* ── Day expand modal ── */
.day-overlay{display:none;position:fixed;inset:0;background:rgba(40,25,10,.45);z-index:800;align-items:center;justify-content:center}
.day-overlay.open{display:flex}
.day-modal{background:#fff;border-radius:20px;padding:0;width:440px;max-width:94vw;max-height:86vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:mIn .2s ease}
@keyframes mIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
.day-modal-hd{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.day-modal-hd h3{font-size:1.05rem;font-weight:800;color:var(--primary-dark)}
.day-modal-hd .cnt{font-size:.8rem;color:var(--muted);background:var(--primary-light);padding:3px 10px;border-radius:12px;font-weight:600}
.day-modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1;padding:4px 6px;border-radius:8px}
.day-modal-close:hover{background:var(--border)}
.day-modal-body{overflow-y:auto;padding:16px 24px 24px;flex:1}

.day-ev-card{display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--border)}
.day-ev-card:last-child{border-bottom:none}
.day-ev-bar{width:4px;align-self:stretch;border-radius:3px;flex-shrink:0}
.day-ev-info{flex:1;min-width:0}
.day-ev-title{font-size:.95rem;font-weight:700;margin-bottom:2px}
.day-ev-teacher{font-size:.82rem;color:var(--muted);margin-bottom:3px}
.day-ev-time{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.day-reg{display:inline-block;margin-top:8px;padding:5px 14px;border-radius:14px;font-size:.78rem;font-weight:600;color:#fff;text-decoration:none}
.day-reg:hover{opacity:.85}

/* ── Detail chip popup ── */
.dpopup{display:none;position:fixed;z-index:900;background:#fff;border-radius:14px;padding:18px 20px;width:290px;box-shadow:0 8px 36px rgba(0,0,0,.22);border-top:5px solid var(--primary)}
.dpopup.open{display:block}
.dpopup h4{font-size:.95rem;font-weight:700;margin-bottom:9px}
.dpopup p{font-size:.82rem;color:var(--muted);margin-bottom:5px;line-height:1.5}
.dclose{position:absolute;top:9px;right:13px;font-size:1.15rem;cursor:pointer;color:var(--muted);background:none;border:none;line-height:1}
.reg-btn{display:inline-block;margin-top:10px;padding:6px 16px;background:var(--primary);color:#fff;text-decoration:none;border-radius:14px;font-size:.8rem;font-weight:600}
.reg-btn:hover{background:var(--primary-dark)}

/* ── Schedule list ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px}
.stat{background:#fff;border-radius:12px;padding:18px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:center}
.snum{font-size:2rem;font-weight:800;color:var(--primary);line-height:1}
.slbl{font-size:.8rem;color:var(--muted);margin-top:4px;font-weight:600}

.msec{margin-bottom:30px}
.mlabel{font-size:1.08rem;font-weight:800;color:var(--primary-dark);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px}
.mlabel::before{content:'';display:inline-block;width:5px;height:20px;background:var(--primary);border-radius:3px}
.dgroup{margin-bottom:16px}
.dhead{font-size:.88rem;font-weight:700;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.ddot{width:7px;height:7px;background:var(--primary);border-radius:50%}

.ecard{background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow);transition:transform .2s}
.ecard:hover{transform:translateY(-2px)}
.ebar{width:5px;align-self:stretch;border-radius:3px;flex-shrink:0}
.ethumb{width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0}
.einfo{flex:1;min-width:0}
.etitle{font-size:.95rem;font-weight:700;margin-bottom:3px}
.etime{font-size:.81rem;color:var(--muted);margin-bottom:3px}
.efee{font-size:.82rem;color:var(--primary-dark);font-weight:700;margin-bottom:3px}
.elink a{font-size:.79rem;color:var(--primary);text-decoration:none;font-weight:600}
.elink a:hover{text-decoration:underline}

/* ── Registration form in popup ── */
.reg-fg{margin-bottom:8px}
.reg-fg label{display:block;font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.reg-fg input{width:100%;padding:7px 10px;border:2px solid var(--border);border-radius:8px;font-size:.83rem;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s;background:#fff}
.reg-fg input:focus{border-color:var(--primary)}
.reg-fg input.err{border-color:#e05c5c;animation:fieldShake .3s}
@keyframes fieldShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ── Contact footer ── */
.contact-footer{background:linear-gradient(135deg,var(--primary-dark),#7a4e22);color:#fff;padding:32px 36px;margin-top:40px}
.contact-footer h3{font-size:1rem;font-weight:800;margin-bottom:20px;opacity:.9;letter-spacing:.5px}
.contact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.contact-item{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;line-height:1.6}
.contact-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.contact-item a{color:rgba(255,255,255,.9);text-decoration:none}
.contact-item a:hover{text-decoration:underline}

/* ── Responsive ── */
@media(max-width:700px){
  /* Header */
  header{padding:14px 16px;flex-wrap:wrap;gap:8px}
  header h1{font-size:1.15rem}
  header p{font-size:.75rem}
  .admin-link{padding:6px 12px;font-size:.75rem}

  /* Tabs */
  main{padding:12px 4px;overflow-x:hidden}
  .tabs{padding:0 8px;overflow-x:auto;gap:0}
  .tab{white-space:nowrap;padding:11px 14px;font-size:.85rem}

  /* Calendar top */
  .cal-top{flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .cal-top h2{font-size:.98rem}
  .month-btns{display:grid;grid-template-columns:repeat(3,1fr);width:100%;gap:6px}
  .m-btn{padding:9px 4px;font-size:.82rem;text-align:center}

  /* Legend: collapsible-ish, compact */
  .legend{padding:8px 10px;gap:8px;margin-bottom:12px}
  .legend-item{font-size:.72rem}

  /* Calendar grid */
  .cal-grid{gap:1px;width:100%}
  .ch{font-size:.6rem;padding:4px 0;letter-spacing:0}
  .cd{min-height:60px;padding:3px 2px;border-radius:4px;overflow:hidden;min-width:0}
  .dnum{font-size:.72rem;width:18px;height:18px;margin-bottom:2px}

  /* Mobile chips: colored left-bar + course name only */
  .chip{
    font-size:0;padding:2px 4px 2px 6px;border-radius:3px;
    margin-bottom:2px;display:block;position:relative;
    border-left:3px solid currentColor;background:transparent !important;
  }
  .chip-title{
    font-size:.6rem;display:block;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    color:inherit;opacity:1;
  }
  .chip-time,.chip-teacher,.chip-fee,.chip-img{display:none}

  /* Hint below calendar */
  .cal-hint{display:block}

  /* Stats */
  .stats{grid-template-columns:repeat(3,1fr);gap:8px}
  .snum{font-size:1.5rem}
  .slbl{font-size:.7rem}

  /* Day modal: slide up from bottom */
  .day-overlay{align-items:flex-end}
  .day-modal{width:100%;border-radius:20px 20px 0 0;max-height:82vh;animation:slideUp .25s ease}

  /* Chip detail popup: fixed at bottom */
  .dpopup{width:calc(100% - 20px);max-width:none;left:10px!important;top:auto!important;bottom:10px;position:fixed;border-radius:16px;border-top:none;border-left:5px solid var(--primary)}

  /* Contact */
  .contact-footer{padding:22px 16px}
  .contact-grid{grid-template-columns:1fr}
  .contact-item{font-size:.82rem}

  /* Schedule cards */
  .ecard{padding:12px 12px}
  .etitle{font-size:.88rem}
}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.cal-hint{display:none;text-align:center;font-size:.72rem;color:var(--muted);padding:6px 0 2px;opacity:.8}
</style>
</head>
<body>

<header>
  <div>
    <h1>🥐 Jen 手作烘焙</h1>
    <p id="header-subtitle">課程行事曆</p>
  </div>
  <a class="admin-link" href="admin.html">⚙️ 管理後台</a>
</header>

<div class="tabs" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
  <div style="display:flex">
    <div class="tab active" onclick="switchTab('calendar',this)">📅 月曆</div>
    <div class="tab" onclick="switchTab('schedule',this)">📋 課程清單</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;margin-right:8px;gap:2px">
    <button class="cart-toggle" id="cart-mode-btn" onclick="toggleCartMode()">🛒 選課報名</button>
    <span style="font-size:.68rem;color:var(--muted)">一次報多堂課程用</span>
  </div>
</div>

<main>
  <div id="view-calendar" class="view active">
    <div class="cal-top">
      <h2 id="cal-title">2026年 5月</h2>
      <div class="month-btns" id="month-btns"></div>
    </div>
    <div id="legend" class="legend"></div>
    <div id="cal-grid" class="cal-grid"></div>
    <p class="cal-hint">👆 點日期數字可展開當天課程</p>
  </div>

  <div id="view-schedule" class="view">
    <div class="stats">
      <div class="stat"><div class="snum" id="s-total">0</div><div class="slbl">課程總數</div></div>
      <div class="stat"><div class="snum" id="s-teachers">0</div><div class="slbl">授課老師</div></div>
      <div class="stat"><div class="snum" id="s-days">0</div><div class="slbl">課程天數</div></div>
    </div>
    <div id="schedule-list"></div>
  </div>
</main>

<div class="contact-footer">
  <h3>📌 上課資訊</h3>
  <div class="contact-grid">
    <div class="contact-item"><span class="contact-icon">📍</span><span>宜蘭縣羅東鎮羅莊二街198號（可路邊停車）</span></div>
    <div class="contact-item"><span class="contact-icon">🚌</span><span>鄰近羅莊櫻花步道，離羅東轉運站 3 分鐘（若需要可接送）</span></div>
    <div class="contact-item"><span class="contact-icon">📲</span><span>報名匯款後請電話或 LINE 確認：<a href="tel:0966864079">0966-864-079</a></span></div>
    <div class="contact-item"><span class="contact-icon">💬</span><span>LINE ID：<a href="https://line.me/ti/p/0966864079" target="_blank" rel="noopener">0966864079</a>（歡迎邀請朋友加入群組）</span></div>
  </div>
  <div style="margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.2);text-align:center">
    <a href="my.html" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);color:#fff;text-decoration:none;padding:10px 22px;border-radius:22px;font-size:.88rem;font-weight:700;border:2px solid rgba(255,255,255,.35)">
      🔍 查詢我的報名記錄
    </a>
  </div>
</div>

<!-- Cart bar -->
<div class="cart-bar" id="cart-bar">
  <div>
    <div style="font-size:.8rem;opacity:.8" id="cart-count-lbl">已選 0 堂</div>
    <div style="font-size:1.05rem;font-weight:800" id="cart-total-lbl"></div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn-cart-clear" onclick="clearCart()">清除</button>
    <button class="btn-cart-reg" onclick="openCartModal()">填寫資料報名 →</button>
  </div>
</div>

<!-- Cart modal -->
<div class="cart-overlay" id="cart-overlay" onclick="if(event.target===this)closeCartModal()">
  <div class="cart-modal" id="cart-modal">
    <div class="cart-modal-hd">
      <div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="data.js"></script>
<script>
firebase.initializeApp(FB_CONFIG);
const db = firebase.database();
firebase.auth().signInAnonymously().catch(()=>{});

// Pre-load with bundled data so page renders instantly
let events = INITIAL_EVENTS.map((e,i)=>({...e, id:'local'+i}));
let curMonth = new Date().getMonth()+1;
let curYear  = new Date().getFullYear();
buildMonthBtns();
renderCal(curYear, curMonth);
renderSchedule();
updateStats();

// Load events from Firebase (with REST API fallback for LINE browser / private mode)
let _fbEventsLoaded = false;
const DB_ROOT = 'https://whitedessert-default-rtdb.asia-southeast1.firebasedatabase.app';

function _applyEvents(val){
  if(!val) return;
  events = Object.entries(val).map(([key, e]) => ({...e, id: key}))
    .filter(e=>!e.hidden)
    .sort((a,b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
  buildMonthBtns();
  renderCal(curYear, curMonth);
  renderSchedule();
  updateStats();
}

async function _fetchEventsREST(){
  try {
    const res = await fetch(`${DB_ROOT}/bakery/events.json`);
    if(!res.ok) return;
    _applyEvents(await res.json());
  } catch(e) {}
}

db.ref('bakery/events').on('value', snap => {
  _fbEventsLoaded = true;
  _applyEvents(snap.val());
}, () => {
  // Firebase SDK failed (auth blocked in LINE/private browser) → use REST API
  _fetchEventsREST();
});

// Fallback: if Firebase hasn't responded in 4s, try REST API directly
setTimeout(()=>{ if(!_fbEventsLoaded) _fetchEventsREST(); }, 4000);

function switchTab(name, el) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  el.classList.add('active');
  if (name==='calendar') renderCal(curYear, curMonth);
  if (name==='schedule') renderSchedule();
  closeDetail();
}

// ── Build month buttons from events ──────────────────────────
function buildMonthBtns(){
  const months = [...new Set(events.map(e=>e.date.slice(0,7)))].sort();
  if(!months.length) return;

  // Pick the closest month to today as default
  const today = new Date().toISOString().slice(0,7);
  const best  = months.find(m=>m>=today) || months[months.length-1];
  const [by, bm] = best.split('-').map(Number);
  curYear  = by;
  curMonth = bm;

  // Update header subtitle
  const first = months[0], last = months[months.length-1];
  const [fy,fm] = first.split('-').map(Number);
  const [ly,lm] = last.split('-').map(Number);
  const range = fy===ly ? `${fy}年 ${fm}月 – ${lm}月` : `${fy}年${fm}月 – ${ly}年${lm}月`;
  document.getElementById('header-subtitle').textContent = range + ' 課程行事曆';

  const wrap = document.getElementById('month-btns');
  wrap.innerHTML = months.map(m=>{
    const [y,mo] = m.split('-').map(Number);
    const active = (y===curYear && mo===curMonth) ? ' active' : '';
    return `<button class="m-btn${active}" onclick="showMonth(${y},${mo},this)">${mo}月</button>`;
  }).join('');
}

// ── Calendar ─────────────────────────────────────────────────
function showMonth(y, m, btn) {
  curYear  = y;
  curMonth = m;
  document.querySelectorAll('.m-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCal(y, m);
}

function renderCal(y, m) {
  document.getElementById('cal-title').textContent = `${y}年 ${m}月`;
  const firstDow  = new Date(y,m-1,1).getDay();
  const totalDays = new Date(y,m,0).getDate();
  const todayStr  = new Date().toISOString().slice(0,10);

  let html = '';
  ['日','一','二','三','四','五','六'].forEach((d,i)=>{
    html += `<div class="ch${i===0||i===6?' we':''}">${d}</div>`;
  });
  for(let i=0;i<firstDow;i++) html+=`<div class="cd empty"></div>`;

  for(let d=1;d<=totalDays;d++){
    const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evts = events.filter(e=>e.date===ds).sort((a,b)=>a.start.localeCompare(b.start));
    const dow  = new Date(y,m-1,d).getDay();
    const we   = dow===0||dow===6;
    let cls = 'cd'+(we?' we':'')+(ds===todayStr?' today':'')+(evts.length?' has-ev':'');

    // Show all chips (no "+more" limit), each with teacher + title
    let chips = evts.map(e=>{
      const c = colorById(e.color);
      return `<div class="chip" data-eid="${e.id}" style="background:${c.bg};color:${c.hex}"
              onclick="handleChipClick(event,'${e.id}')">
        ${e.image?`<img class="chip-img" src="${e.image}" alt="" style="object-position:${e.imgPos||'center'}">`:''}
        <div class="chip-time">${e.start}</div>
        <div class="chip-teacher">${e.teacher}</div>
        <div class="chip-title">${e.title}</div>
        ${formatFee(e.fee)?`<div class="chip-fee">${formatFee(e.fee)}</div>`:''}
      </div>`;
    }).join('');

    // Day number click → expand modal
    html+=`<div class="${cls}">
      <div class="dnum" onclick="openDayModal('${ds}')" title="展開 ${formatDate(ds)} 課程">${d}</div>
      ${chips}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  renderLegend();
}

function renderLegend(){
  const seen={};
  events.forEach(e=>{ if(!seen[e.teacher]) seen[e.teacher]=e.color; });
  document.getElementById('legend').innerHTML = Object.entries(seen).map(([t,c])=>{
    const col=colorById(c);
    return `<div class="legend-item"><div class="ldot" style="background:${col.hex}"></div>${t}</div>`;
  }).join('') || '<span style="color:#bbb;font-size:.8rem">尚無課程</span>';
}

// ── Day expand modal ─────────────────────────────────────────
function openDayModal(dateStr){
  const evts = events.filter(e=>e.date===dateStr).sort((a,b)=>a.start.localeCompare(b.start));
  if(!evts.length) return;
  document.getElementById('day-modal-date').textContent = formatDate(dateStr);
  document.getElementById('day-modal-cnt').textContent  = `共 ${evts.length} 堂`;
  document.getElementById('day-modal-body').innerHTML = evts.map(e=>{
    const c = colorById(e.color);
    return `<div class="day-ev-card">
      <div class="day-ev-bar" style="background:${c.hex}"></div>
      <div class="day-ev-info">
        ${e.image?`<img src="${e.image}" style="width:100%;border-radius:8px;margin-bottom:8px;display:block">`:''}
        <div class="day-ev-title" style="color:${c.hex}">${e.title}</div>
        <div class="day-ev-teacher">👨‍🍳 ${e.teacher}</div>
        <div class="day-ev-time">🕐 ${e.start} – ${e.end}</div>
        ${formatFee(e.fee)?`<div class="day-ev-time">💵 ${formatFee(e.fee)}</div>`:''}
        <button class="day-reg" style="background:${c.hex};border:none;cursor:pointer" onclick="openRegFromModal('${e.id}')">📝 立即報名</button>
      </div>
    </div>`;
  }).join('');
  closeDetail();
  document.getElementById('day-overlay').classList.add('open');
}
function closeDayModal(e){
  if(e.target===document.getElementById('day-overlay')) closeDayModalBtn();
}
function closeDayModalBtn(){
  document.getElementById('day-overlay').classList.remove('open');
}

// ── Chip detail popup ─────────────────────────────────────────
function showDetailContent(id){
  const e = events.find(x=>x.id===id);
  if(!e) return;
  const c = colorById(e.color);
  document.getElementById('dpopup').style.borderTopColor = c.hex;
  document.getElementById('dpopup-body').innerHTML =
    (e.image?`<img src="${e.image}" style="max-width:100%;max-height:260px;width:auto;height:auto;border-radius:8px;margin-bottom:10px;display:block">`:'') +
    `<h4 style="color:${c.hex}">${e.title}</h4>
    <p>👨‍🍳 ${e.teacher}</p>
    <p>📅 ${formatDate(e.date)}</p>
    <p>🕐 ${e.start} – ${e.end}</p>
    ${formatFee(e.fee)?`<p>💵 ${formatFee(e.fee)}</p>`:''}
    <a class="reg-btn" href="register.html?id=${e.id}" style="background:${c.hex};display:inline-block;margin-top:10px">📝 立即報名</a>`;
}

function showDetail(ev, id){
  ev.stopPropagation();
  showDetailContent(id);
  const p = document.getElementById('dpopup');
  if (window.innerWidth > 700) {
    const chip = ev.target.closest('.chip') || ev.target;
    const r    = chip.getBoundingClientRect();
    p.style.top = '0px'; p.style.left = '0px';
    requestAnimationFrame(()=>{
      const ph=p.offsetHeight, pw=p.offsetWidth;
      let top=r.bottom+6, left=r.left;
      if(left+pw+4>window.innerWidth) left=window.innerWidth-pw-4;
      if(left<4) left=4;
      if(top+ph+4>window.innerHeight) top=r.top-ph-6;
      if(top<4) top=4;
      p.style.top=top+'px'; p.style.left=left+'px';
    });
  }
  p.classList.add('open');
  if(window.innerWidth<=700) document.getElementById('dpopup-overlay').style.display='block';
}


function openRegFromModal(eventId){
  location.href = 'register.html?id=' + eventId;
}
function closeDetail(){ document.getElementById('dpopup').classList.remove('open'); document.getElementById('dpopup-overlay').style.display='none'; }
document.addEventListener('click',e=>{
  if(!e.target.closest('#dpopup')&&!e.target.closest('.chip')&&!e.target.closest('.dnum')) closeDetail();
});

function openRegFromSchedule(eventId){
  location.href = 'register.html?id=' + eventId;
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeDetail(); closeDayModalBtn(); closeCartModal(); }});

// ── Cart / 選課報名 ───────────────────────────────────────────
let cart = {};
let cartMode = false;
let cartSuccessItems = [];

function downloadIcs(items){
  const pad = n=>String(n).padStart(2,'0');
  const toIcsDt = (dateStr, timeStr)=>{
    const [y,m,d]=dateStr.split('-'); const [hh,mm]=(timeStr||'00:00').split(':');
    return `${y}${pad(m)}${pad(d)}T${pad(hh)}${pad(mm)}00`;
  };
  const uid = ()=>Math.random().toString(36).slice(2)+'@jen-bakery';
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Jen手作烘焙//TC','CALSCALE:GREGORIAN'];
  items.forEach(e=>{
    lines.push('BEGIN:VEVENT',
      `UID:${uid()}`,
      `DTSTART:${toIcsDt(e.date,e.start)}`,
      `DTEND:${toIcsDt(e.date,e.end)}`,
      `SUMMARY:${e.title}`,
      `DESCRIPTION:${e.teacher}`,
      'LOCATION:宜蘭縣羅東鎮羅莊二街198號',
      'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='Jen烘焙課程.ics'; a.click();
}

function toggleCartMode(){
  cartMode = !cartMode;
  const btn = document.getElementById('cart-mode-btn');
  btn.classList.toggle('active', cartMode);
  btn.textContent = cartMode ? '✓ 選課中 — 取消' : '🛒 選課報名';
  if(!cartMode){ cart={}; updateCartBar(); }
  renderCal(curYear, curMonth);
  renderSchedule();
}

function handleChipClick(event, id){
  if(cartMode){ event.stopPropagation(); toggleCartItem(id); }
  else showDetail(event, id);
}

function handleSchedReg(event, id){
  if(cartMode){ toggleCartItem(id); }
  else openRegFromSchedule(id);
}

function toggleCartItem(id){
  if(cart[id]) delete cart[id];
  else { const ev=events.find(e=>String(e.id)===String(id)); if(ev) cart[id]=ev; }
  updateCartChips();
  updateCartBar();
}

function updateCartChips(){
  document.querySelectorAll('.chip[data-eid]').forEach(el=>{
    el.classList.toggle('in-cart', !!cart[el.dataset.eid]);
  });
  document.querySelectorAll('.ecard[data-eid]').forEach(el=>{
    el.classList.toggle('in-cart', !!cart[el.dataset.eid]);
  });
}

function updateCartBar(){
  const items = Object.values(cart);
  const bar = document.getElementById('cart-bar');
  if(!items.length || !cartMode){ bar.classList.remove('show'); return; }
  bar.classList.add('show');
  const total = items.reduce((s,e)=>s+(Number(e.fee)||0),0);
  document.getElementById('cart-count-lbl').textContent = `已選 ${items.length} 堂`;
  document.getElementById('cart-total-lbl').textContent = total>0 ? `合計 NT$${total.toLocaleString('zh-TW')} 元` : '';
}

function clearCart(){ cart={}; updateCartChips(); updateCartBar(); }

function openCartModal(){
  const items = Object.values(cart).sort((a,b)=>a.date.localeCompare(b.date));
  if(!items.length) return;
  const total = items.reduce((s,e)=>s+(Number(e.fee)||0),0);
  document.getElementById('cart-modal-sub').textContent = `${items.length} 堂課程`;
  document.getElementById('cart-course-list').innerHTML = items.map(e=>`
    <div class="cart-item-row">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;color:var(--primary-dark)">${e.title}</div>
        <div style="font-size:.76rem;color:var(--muted)">${formatDate(e.date)} ${e.start}–${e.end} · ${e.teacher}</div>
      </div>
      <div style="font-weight:700;white-space:nowrap;color:var(--primary-dark)">${Number(e.fee)>0?`NT$${Number(e.fee).toLocaleString('zh-TW')}`:'—'}</div>
    </div>`).join('');
  document.getElementById('cart-total-row').innerHTML = total>0
    ? `<span>合計</span><span style="color:var(--primary)">NT$${total.toLocaleString('zh-TW')} 元</span>`
    : '';
  ['cart-name','cart-phone','cart-email','cart-fb','cart-line','cart-note'].forEach(id=>{
    const el=document.getElementById(id); if(el){el.value='';el.classList.remove('err');}
  });
  document.getElementById('cart-count').value=1;
  document.getElementById('cart-remit-date').value='';
  document.getElementById('cart-remit-last5').value='';
  ['crg-group','crg-shuttle'].forEach(gid=>{
    document.querySelectorAll(`#${gid} .cradio-opt`).forEach(o=>o.classList.remove('selected'));
    const rb=document.querySelector(`#${gid} input[type=radio]:checked`); if(rb) rb.checked=false;
  });
  document.getElementById('cart-err').style.display='none';
  document.getElementById('cart-submit-btn').disabled=false;
  document.getElementById('cart-submit-btn').textContent='確認報名';
  document.getElementById('cart-modal-body').style.display='block';
  document.getElementById('cart-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('cart-name').focus(),80);
}

function cartSelectRadio(groupId, el){
  document.querySelectorAll(`#${groupId} .cradio-opt`).forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
}

function closeCartModal(){ document.getElementById('cart-overlay').classList.remove('open'); }

async function submitCart(e){
  e.preventDefault();
  const name       = document.getElementById('cart-name').value.trim();
  const phone      = document.getElementById('cart-phone').value.trim();
  const email      = document.getElementById('cart-email').value.trim();
  const fb         = document.getElementById('cart-fb').value.trim();
  const line       = document.getElementById('cart-line').value.trim();
  const group      = document.querySelector('input[name="cart-group"]:checked')?.value||'';
  const count      = Number(document.getElementById('cart-count').value)||1;
  const remitDate  = document.getElementById('cart-remit-date').value;
  const remitLast5 = document.getElementById('cart-remit-last5').value.trim();
  const shuttle    = document.querySelector('input[name="cart-shuttle"]:checked')?.value||'';
  const note       = document.getElementById('cart-note').value.trim();
  const errEl = document.getElementById('cart-err');

  let ok = true;
  document.getElementById('cart-name').classList.toggle('err',!name); if(!name) ok=false;
  document.getElementById('cart-phone').classList.toggle('err',!phone); if(!phone) ok=false;
  document.getElementById('cart-email').classList.toggle('err',!email); if(!email) ok=false;
  if(!fb&&!line) ok=false;
  if(!ok){ errEl.textContent='請確認必填欄位（姓名、電話、Email、FB/LINE 擇一）'; errEl.style.display='block'; return; }

  const btn=document.getElementById('cart-submit-btn');
  btn.disabled=true; btn.textContent='報名中…'; errEl.style.display='none';
  const items=Object.values(cart); const ts=Date.now();
  try{
    await Promise.all(items.map((ev,i)=>
      db.ref('bakery/registrations/'+ev.id).push({
        name,phone,email,fb,line,group,count,remitDate,remitLast5,shuttle,note,
        paid:false,createdAt:ts+i
      })
    ));
    const total=items.reduce((s,ev)=>s+(Number(ev.fee)||0),0);
    cartSuccessItems = items;
    // Show success
    document.getElementById('cart-modal-body').innerHTML = `
      <div style="text-align:center;padding:32px 16px">
        <div style="font-size:3rem;margin-bottom:12px">🎉</div>
        <div style="font-size:1.05rem;font-weight:800;color:var(--primary-dark);margin-bottom:6px">${name}，報名成功！</div>
        <div style="font-size:.86rem;color:var(--muted);margin-bottom:16px">已完成 ${items.length} 堂課程報名</div>
        ${total>0?`<div style="font-size:1rem;font-weight:800;color:var(--primary);background:var(--primary-light);border-radius:12px;padding:12px 20px;margin-bottom:16px">應繳金額 NT$${total.toLocaleString('zh-TW')} 元</div>`:''}
        <div style="font-size:.82rem;color:var(--muted);line-height:1.9;margin-bottom:20px">匯款後請來電或 LINE 告知<br>📞 0966-864-079</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button onclick="downloadIcs(cartSuccessItems)" style="background:var(--primary-light);color:var(--primary-dark);border:2px solid var(--primary);padding:10px 20px;border-radius:22px;font-size:.86rem;font-weight:700;cursor:pointer">📅 加入行事曆</button>
          <button onclick="closeCartModal()" style="background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:22px;font-size:.86rem;font-weight:700;cursor:pointer">完成</button>
        </div>
      </div>`;
    cart={}; cartMode=false;
    document.getElementById('cart-mode-btn').classList.remove('active');
    document.getElementById('cart-mode-btn').textContent='🛒 選課報名';
    document.getElementById('cart-bar').classList.remove('show');
    renderCal(curYear,curMonth); renderSchedule();
  }catch(err){
    errEl.textContent='報名失敗，請稍後再試'; errEl.style.display='block';
    btn.disabled=false; btn.textContent='確認報名';
  }
}

// ── Schedule list ─────────────────────────────────────────────
function updateStats(){
  document.getElementById('s-total').textContent    = events.length;
  document.getElementById('s-teachers').textContent = new Set(events.map(e=>e.teacher)).size;
  document.getElementById('s-days').textContent     = new Set(events.map(e=>e.date)).size;
}

function renderSchedule(){
  const sorted = [...events].sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
  const byYM = {};
  sorted.forEach(e=>{
    const ym = e.date.slice(0,7); // "2026-08"
    if(!byYM[ym]) byYM[ym]={};
    if(!byYM[ym][e.date]) byYM[ym][e.date]=[];
    byYM[ym][e.date].push(e);
  });

  let html='';
  Object.keys(byYM).sort().forEach(ym=>{
    const [y,mo] = ym.split('-').map(Number);
    html+=`<div class="msec"><div class="mlabel">${y}年 ${mo}月</div>`;
    Object.keys(byYM[ym]).sort().forEach(date=>{
      html+=`<div class="dgroup"><div class="dhead"><div class="ddot"></div>${formatDate(date)}</div>`;
      byYM[ym][date].forEach(e=>{
        const c = colorById(e.color);
        html+=`<div class="ecard" data-eid="${e.id}" onclick="if(cartMode)toggleCartItem('${e.id}')">
          ${e.image?`<img class="ethumb" src="${e.image}" alt="${e.title}">`:`<div class="ebar" style="background:${c.hex}"></div>`}
          <div class="einfo">
            <div class="etitle">${e.teacher}｜${e.title}</div>
            <div class="etime">🕐 ${e.start} – ${e.end}</div>
            ${formatFee(e.fee)?`<div class="efee">💵 ${formatFee(e.fee)}</div>`:''}
            <div class="elink"><a href="#" onclick="event.preventDefault();handleSchedReg(event,'${e.id}')" style="color:var(--primary);text-decoration:none;font-weight:600">📝 立即報名</a></div>
          </div>
        </div>`;
      });
      html+='</div>';
    });
    html+='</div>';
  });
  document.getElementById('schedule-list').innerHTML = html||'<p style="color:#bbb;text-align:center;padding:40px">尚無課程資料</p>';
}

</script>
</body>
</html>
