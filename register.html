<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課程報名 | Jen 手作烘焙</title>
<meta name="description" content="Jen 手作烘焙課程報名">
<style>
:root{
  --primary:#c17f3e;--primary-light:#f5e6d3;--primary-dark:#8b5a27;
  --bg:#fdf8f3;--card:#fff;--text:#3d2c1e;--muted:#8a6d5a;--border:#e8d5c0;
  --shadow:0 2px 14px rgba(193,127,62,.13);
  --green:#5c9e6e;--red:#e05c5c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{background:linear-gradient(135deg,var(--primary-dark),var(--primary) 55%,#e8a45a);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(139,90,39,.3)}
header h1{font-size:1.1rem;font-weight:800}
.back-link{color:rgba(255,255,255,.9);text-decoration:none;font-size:.82rem;border:1.5px solid rgba(255,255,255,.45);padding:6px 14px;border-radius:16px;transition:all .2s}
.back-link:hover{background:rgba(255,255,255,.2)}

.page{max-width:520px;margin:0 auto;padding:28px 16px 48px}

/* Loading */
.loading{text-align:center;padding:80px 20px;color:var(--muted)}
.loading .spin{font-size:2.5rem;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Course card */
.course-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px;border:1px solid var(--border)}
.course-img{width:100%;max-height:220px;object-fit:cover;display:block}
.course-body{padding:20px 22px}
.course-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;color:#fff;margin-bottom:10px}
.course-title{font-size:1.18rem;font-weight:800;line-height:1.4;margin-bottom:14px}
.meta-row{display:flex;align-items:center;gap:8px;font-size:.87rem;color:var(--muted);margin-bottom:7px}
.meta-row b{color:var(--text);font-weight:600}

/* Form */
.form-card{background:var(--card);border-radius:16px;padding:24px 22px;box-shadow:var(--shadow);border:1px solid var(--border)}
.form-title{font-size:1rem;font-weight:800;color:var(--primary-dark);margin-bottom:18px}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg textarea{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:.92rem;font-family:inherit;color:var(--text);background:var(--bg);transition:border-color .2s;outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--primary)}
.fg input.err,.fg textarea.err{border-color:var(--red);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.fg textarea{min-height:76px;resize:vertical}
.reg-note{font-size:.77rem;color:var(--muted);line-height:1.7;margin-bottom:16px;padding:10px 14px;background:var(--primary-light);border-radius:10px}
.btn-submit{width:100%;padding:14px;color:#fff;border:none;border-radius:22px;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;background:var(--primary)}
.btn-submit:hover{filter:brightness(.9)}
.btn-submit:disabled{opacity:.55;cursor:not-allowed}

/* Success */
.success-card{background:var(--card);border-radius:16px;padding:44px 24px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}
.success-icon{font-size:4rem;margin-bottom:16px}
.success-card h2{font-size:1.25rem;font-weight:800;color:var(--primary-dark);margin-bottom:10px}
.success-card p{font-size:.88rem;color:var(--muted);line-height:1.9;margin-bottom:24px}
.btn-back{display:inline-block;padding:11px 32px;background:var(--primary);color:#fff;border-radius:22px;font-size:.9rem;font-weight:700;text-decoration:none;transition:all .2s}
.btn-back:hover{background:var(--primary-dark)}

/* Error */
.error-card{background:var(--card);border-radius:16px;padding:60px 24px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}
.error-card .icon{font-size:3rem;margin-bottom:14px}
.error-card p{color:var(--muted);font-size:.9rem;margin-bottom:20px}

@media(max-width:520px){
  .page{padding:20px 12px 40px}
  .course-body{padding:16px}
  .form-card{padding:20px 16px}
}
</style>
</head>
<body>

<header>
  <h1>🥐 Jen 手作烘焙</h1>
  <a class="back-link" href="index.html">← 課程行事曆</a>
</header>

<div class="page">

  <div id="state-loading" class="loading">
    <div class="spin">🥐</div>
    <div>載入課程資料…</div>
  </div>

  <div id="state-error" class="error-card" style="display:none">
    <div class="icon">😢</div>
    <p>找不到此課程，可能連結已失效</p>
    <a href="index.html" class="btn-back">← 返回課程行事曆</a>
  </div>

  <div id="state-main" style="display:none">
    <div id="course-card" class="course-card"></div>

    <div id="form-wrap" class="form-card">
      <div class="form-title">📝 填寫報名資料</div>
      <div class="fg">
        <label>姓名 *</label>
        <input type="text" id="r-name" placeholder="請輸入真實姓名" autocomplete="name">
      </div>
      <div class="fg">
        <label>電話 *</label>
        <input type="tel" id="r-phone" placeholder="0912-345-678" autocomplete="tel">
      </div>
      <div class="fg">
        <label>備註（選填）</label>
        <textarea id="r-note" placeholder="飲食限制、過敏原或其他問題…"></textarea>
      </div>
      <div class="reg-note">
        📌 報名後請透過電話或 LINE 確認並完成匯款<br>
        📲 聯絡：<a href="tel:0966864079" style="color:var(--primary);font-weight:600">0966-864-079</a>
      </div>
      <button class="btn-submit" id="r-submit" onclick="submitReg()">確認報名</button>
    </div>

    <div id="success-wrap" class="success-card" style="display:none">
      <div class="success-icon">✅</div>
      <h2>報名成功！</h2>
      <p>感謝您的報名！<br>
         我們會盡快與您聯絡確認名額並告知匯款方式<br>
         📲 電話 / LINE：0966-864-079</p>
      <a href="index.html" class="btn-back">← 返回課程行事曆</a>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="data.js"></script>
<script>
firebase.initializeApp(FB_CONFIG);
const db = firebase.database();
firebase.auth().signInAnonymously().catch(()=>{});

const params  = new URLSearchParams(location.search);
const eventId = params.get('id');
let submitColor = '#c17f3e';

if(!eventId){ showError(); } else { loadEvent(); }

async function loadEvent(){
  // Try bundled data first (instant)
  const local = INITIAL_EVENTS.find(e => String(e.id) === eventId);
  if(local){ renderCourse(local); }

  try{
    const snap = await db.ref('bakery/events/' + eventId).once('value');
    const data = snap.val();
    if(data){ renderCourse(data); }
    else if(!local){ showError(); }
  }catch(e){
    if(!local) showError();
  }
}

function renderCourse(e){
  const c = colorById(e.color);
  submitColor = c.hex;
  document.title = `${e.title} 報名 | Jen 手作烘焙`;

  document.getElementById('course-card').innerHTML =
    (e.image ? `<img class="course-img" src="${e.image}" alt="${e.title}">` : '') +
    `<div class="course-body">
      <span class="course-badge" style="background:${c.hex}">${e.teacher}</span>
      <div class="course-title" style="color:${c.hex}">${e.title}</div>
      <div class="meta-row">📅 <b>${formatDate(e.date)}</b></div>
      <div class="meta-row">🕐 <b>${e.start} – ${e.end}</b></div>
      ${formatFee(e.fee)?`<div class="meta-row">💵 <b>${formatFee(e.fee)}</b></div>`:''}
    </div>`;

  document.getElementById('r-submit').style.background = c.hex;
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-main').style.display   = 'block';
}

function showError(){
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-error').style.display   = 'block';
}

async function submitReg(){
  const name  = document.getElementById('r-name').value.trim();
  const phone = document.getElementById('r-phone').value.trim();
  const note  = document.getElementById('r-note').value.trim();
  document.getElementById('r-name').classList.toggle('err', !name);
  document.getElementById('r-phone').classList.toggle('err', !phone);
  if(!name || !phone) return;

  const btn = document.getElementById('r-submit');
  btn.disabled = true; btn.textContent = '報名中…';

  try{
    await db.ref('bakery/registrations/' + eventId).push({
      name, phone, note, paid: false, createdAt: Date.now()
    });
    document.getElementById('form-wrap').style.display    = 'none';
    document.getElementById('success-wrap').style.display = 'block';
  }catch(err){
    btn.disabled = false; btn.textContent = '確認報名';
    alert('報名失敗，請直接電話聯絡 0966-864-079');
  }
}
</script>
</body>
</html>
